# postgresql.conf — Docker + pgBackRest edition
# Mount read-only into container (see docker-compose.yml)

listen_addresses = '*'
max_connections = 100

shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL & pgBackRest archiving
wal_level = replica
archive_mode = on
# pgbackrest binary is bind-mounted from host into container
archive_command = 'pgbackrest --config=/etc/pgbackrest/pgbackrest-myapp.conf --stanza=myapp archive-push %p'
archive_timeout = 300
wal_keep_size = 1024
max_wal_senders = 3
hot_standby = on

checkpoint_completion_target = 0.9
wal_buffers = 16MB

log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_line_prefix = '%t [%p] %u@%d '
log_checkpoints = on
log_lock_waits = on

random_page_cost = 1.1
effective_io_concurrency = 200
autovacuum = on
